name: ✅ Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHPUnit — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.3"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, sqlite3, pdo_sqlite
          coverage: none

      - name: 📦 Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📦 Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: ⚙️ Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_DATABASE=Shop|DB_DATABASE=:memory:|' .env
          sed -i 's/CACHE_STORE=redis/CACHE_STORE=array/' .env
          sed -i 's/QUEUE_CONNECTION=redis/QUEUE_CONNECTION=sync/' .env
          php artisan key:generate

      - name: 🗄️ Run migrations
        run: php artisan migrate --force

      - name: 🧪 Run tests
        run: php artisan test --parallel

      - name: 📊 Test summary
        if: always()
        run: php artisan test --log-junit storage/logs/junit.xml || true

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: storage/logs/junit.xml
          retention-days: 7
