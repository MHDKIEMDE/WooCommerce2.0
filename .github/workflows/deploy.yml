name: 🚀 Deploy to VPS (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy → shop.monghetto.com
    runs-on: self-hosted

    steps:

      - name: 📥 Mise à jour du code
        run: |
          cd /var/www/shop/Agri---Sho
          git fetch origin
          git reset --hard origin/main

      - name: 🐳 Docker build & up
        run: |
          cd /var/www/shop/Agri---Sho/docker
          docker compose build
          docker compose up -d

      - name: 🗄️ Migrations
        run: |
          cd /var/www/shop/Agri---Sho/docker
          docker compose exec -T app php artisan migrate --force

      - name: ⚡ Caches production
        run: |
          cd /var/www/shop/Agri---Sho/docker
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache
          docker compose exec -T app php artisan event:cache

      - name: 🔁 Queue restart
        run: |
          cd /var/www/shop/Agri---Sho/docker
          docker compose exec -T app php artisan queue:restart

      - name: 🧹 Nettoyage Docker
        run: docker image prune -f

      - name: ✅ Terminé
        run: echo "Déploiement terminé → shop.monghetto.com"
