limit_req_zone $binary_remote_addr zone=shop_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=shop_auth:10m rate=10r/m;

server {
    listen 80;
    server_name shop.monghetto.com 145.223.33.28;

    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Bloquer les bots et scanners
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab)) {
        return 444;
    }

    # Bloquer accès fichiers sensibles
    location ~* \.(env|git|sql|log|sh|key|pem)$ {
        return 403;
    }

    # Laravel front controller
    location / {
        limit_req zone=shop_global burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM — proxy vers le container php
    location ~ \.php$ {
        limit_req zone=shop_global burst=20 nodelay;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Cache navigateur — assets statiques
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Taille max upload (images produits)
    client_max_body_size 20M;
}
