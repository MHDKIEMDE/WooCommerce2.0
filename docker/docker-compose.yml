services:

  # ── PHP-FPM — exécute le code Laravel ────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop-php
    restart: unless-stopped
    volumes:
      - /var/www/shop:/var/www/html          # code Laravel monté depuis le VPS
      - shop-storage:/var/www/html/storage   # storage persistant entre redémarrages
    environment:
      - APP_ENV=production
    networks:
      - shop-network

  # ── Nginx — sert les fichiers statiques et proxy vers PHP ────────────────
  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    restart: unless-stopped
    ports:
      - "8080:80"                            # accessible sur 145.223.33.28:8080
    volumes:
      - /var/www/shop:/var/www/html          # même volume que php
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - shop-network

# ── Volume persistant pour storage Laravel ───────────────────────────────────
volumes:
  shop-storage:

# ── Réseau interne entre les containers ──────────────────────────────────────
networks:
  shop-network:
    driver: bridge
